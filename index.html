<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World Cup 2026 Pool</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --navy:#e8dfca; --navy2:#f0e9d8; --panel:#faf6ec; --panel2:#f2ebda;
    --line:#dccfb2; --gold:#c89331; --gold-dim:#a8761f;
    --text:#33302a; --muted:#8d8472; --good:#2f7d70; --bad:#bd5638; --draw:#bf9230;
    --shadow:0 1px 2px rgba(70,58,30,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--navy);color:var(--text);font-family:"Futura","Avenir Next","Century Gothic",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
  a{color:var(--gold)}
  .hidden{display:none !important}
  .wrap{max-width:920px;margin:0 auto;padding:0 14px 90px}

  /* Password gate */
  #gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--navy);z-index:50;padding:20px}
  .gate-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:34px 28px;max-width:380px;width:100%;text-align:center;box-shadow:var(--shadow)}
  .badge{font-size:13px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;font-weight:700}
  .gate-card h1{font-size:26px;margin:8px 0 4px;line-height:1.15}
  .gate-card p{color:var(--muted);font-size:14px;margin:0 0 22px}
  input,select,textarea{font-size:16px;font-family:inherit}
  .field{width:100%;background:var(--navy2);border:1px solid var(--line);color:var(--text);border-radius:11px;padding:13px 14px;outline:none}
  .field:focus{border-color:var(--gold-dim)}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:11px;font-size:15px;font-weight:600}
  .btn-gold{background:var(--gold);color:#fff8ec;padding:13px 18px;width:100%;margin-top:12px;letter-spacing:.3px}
  .btn-gold:active{transform:translateY(1px)}
  .btn-gold:disabled{opacity:.5;cursor:default}
  .gate-err{color:var(--bad);font-size:13px;margin-top:12px;min-height:16px}

  /* Header */
  header.app{padding:22px 0 6px;text-align:center}
  header.app .sub{font-size:12px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;font-weight:700}
  header.app h1{margin:6px 0 2px;font-size:24px}
  .pot{color:var(--muted);font-size:13px}
  .live{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-top:6px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--good)}
  .commish-bar{margin-top:9px}
  .commish-link{background:transparent;border:1px solid var(--line);color:var(--muted);padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:.3px}
  .commish-link:hover{color:var(--gold);border-color:var(--gold-dim)}
  .owner-tag{min-width:90px;text-align:right;font-size:13px;font-weight:700;color:var(--gold)}
  .owner-tag.none{color:var(--muted);font-weight:500}
  .scorebox .sc{display:inline-block;min-width:18px;text-align:center;font-weight:800;font-size:16px}

  /* Tabs */
  nav.tabs{position:sticky;top:0;z-index:20;display:flex;gap:6px;padding:10px 0;background:var(--navy);margin-bottom:6px}
  nav.tabs button{background:var(--panel);color:var(--muted);border:1px solid var(--line);padding:9px 10px;white-space:nowrap;font-weight:600;font-size:14px;letter-spacing:.2px;flex:1;text-align:center}
  nav.tabs button.active{background:var(--gold);color:#fff8ec;border-color:var(--gold)}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
  .card h2{margin:0 0 4px;font-size:18px}
  .card .hint{color:var(--muted);font-size:13px;margin:0 0 14px}
  .section-title{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;margin:6px 2px 10px}

  /* Leaderboard */
  table{width:100%;border-collapse:collapse}
  .lb th{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);text-align:left;padding:8px 8px;border-bottom:1px solid var(--line)}
  .lb td{padding:11px 8px;border-bottom:1px solid var(--line);font-size:15px;vertical-align:middle}
  .lb tr:last-child td{border-bottom:none}
  .rank{width:34px;font-weight:700;color:var(--gold)}
  .rank.r1{color:var(--gold)}.rank.r2{color:var(--draw)}
  .pname{font-weight:600}
  .pts{font-weight:800;font-size:18px;text-align:right}
  .expand{cursor:pointer}
  .teamline{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);padding:3px 0}
  .teamline b{color:var(--text);font-weight:600}
  .breakdown{background:var(--navy2);border-radius:10px;padding:8px 12px;margin-top:8px}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--navy2);color:var(--muted);border:1px solid var(--line)}
  .pill.owned{color:var(--gold);border-color:var(--gold-dim)}

  /* Fun facts */
  .fact-row{font-size:14px;padding:9px 2px;border-bottom:1px solid var(--line);line-height:1.5}
  .fact-row:last-child{border-bottom:none}

  /* Draft grid */
  .draft-grid{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .draft-grid table{min-width:560px}
  .draft-grid th,.draft-grid td{border:1px solid var(--line);padding:8px 6px;text-align:center;font-size:13px}
  .draft-grid th{background:var(--navy2);color:var(--gold);font-size:11px;text-transform:uppercase;letter-spacing:1px}
  .draft-grid td .pk{display:block;font-size:10px;color:var(--muted)}
  .draft-grid td.me{background:rgba(231,194,92,.10)}
  .arrow{color:var(--gold);font-size:11px}

  /* Teams */
  .grp-head{display:flex;align-items:center;gap:8px;margin:14px 2px 8px}
  .grp-head .g{background:var(--gold);color:#fff8ec;font-weight:700;border-radius:7px;padding:2px 9px;font-size:13px}
  .grp-head .stand{margin-left:auto;font-size:11px;color:var(--muted)}
  .team-row{display:flex;align-items:center;gap:10px;padding:9px 6px;border-bottom:1px solid var(--line)}
  .team-row:last-child{border-bottom:none}
  .team-row .tn{flex:1;font-weight:600;font-size:15px}
  .team-row .rec{font-size:12px;color:var(--muted);min-width:74px;text-align:right}
  .team-row .tpts{min-width:30px;text-align:right;font-weight:800;color:var(--gold)}
  .team-row select{max-width:140px;background:var(--navy2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:7px 8px}

  /* Matches */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
  .filters select{background:var(--navy2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:9px 10px;flex:1;min-width:120px}
  .match{display:grid;grid-template-columns:1fr 96px 1fr;align-items:center;gap:6px;padding:10px 4px;border-bottom:1px solid var(--line)}
  .match:last-child{border-bottom:none}
  .match .side{display:flex;flex-direction:column;gap:2px;min-width:0}
  .match .side.away{text-align:right;align-items:flex-end}
  .match .tm{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .match .own{font-size:10px;color:var(--gold)}
  .match .own.none{color:var(--muted)}
  .scorebox{display:flex;align-items:center;justify-content:center;gap:5px}
  .scorebox input{width:38px;text-align:center;background:var(--navy2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 4px;font-weight:700}
  .scorebox span{color:var(--muted)}
  .mlabel{grid-column:1 / -1;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .winner{color:var(--good)}

  /* Recaps */
  .recap-form{margin-top:14px;display:flex;flex-direction:column;gap:8px}
  .recap-form textarea.field{min-height:80px;resize:vertical;display:block}
  .recap-head{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
  .recap-title{font-weight:700;font-size:16px;flex:1}
  .recap-date{font-size:12px;color:var(--muted);white-space:nowrap}
  .recap-del{background:transparent;border:none;color:var(--bad);font-size:15px;padding:2px 6px;opacity:.45;border-radius:6px}
  .recap-del:hover{opacity:1;background:var(--navy2)}
  .recap-body{font-size:14px;line-height:1.6;color:var(--text);white-space:pre-wrap}

  /* Match to Watch */
  .mtw-card{background:var(--panel2);border-color:var(--gold-dim) !important}
  .mtw-match{display:flex;align-items:center;gap:12px;padding:12px 0 8px}
  .mtw-side{flex:1}
  .mtw-side.mtw-away{text-align:right}
  .mtw-team{font-weight:700;font-size:16px}
  .mtw-owner{font-size:12px;color:var(--gold);margin-top:2px}
  .mtw-vs{font-size:14px;color:var(--muted);font-weight:600;min-width:24px;text-align:center}
  .mtw-meta{font-size:12px;color:var(--muted);margin-bottom:6px}
  .mtw-reasons{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .mtw-badge{background:var(--navy2);border:1px solid var(--line);border-radius:20px;font-size:12px;padding:4px 10px;color:var(--text);line-height:1.4}
  .mtw-editor{border-top:1px solid var(--line);padding-top:10px;margin-top:10px}
  .mtw-editor-head{display:flex;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:0 0 6px;gap:8px}
  .mtw-rule-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line)}
  .mtw-rule-row:last-of-type{border-bottom:none}
  .mtw-rule-label{flex:1;font-size:13px}
  .mtw-weight{width:52px;text-align:center;background:var(--navy2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:6px 4px;font-size:14px;font-family:inherit}
  .mtw-toggle{width:18px;height:18px;accent-color:var(--gold);cursor:pointer;flex-shrink:0;margin:0 9px}

  /* Smack Talk */
  .st-match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
  .st-match-btn{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 13px;cursor:pointer;font-size:13px;color:var(--text);text-align:left;transition:border-color .15s;width:100%}
  .st-match-btn.active{border-color:var(--gold);background:var(--navy2)}
  .st-match-btn .st-teams{font-weight:700;font-size:13px;margin-bottom:2px;color:var(--text)}
  .st-match-btn .st-meta{color:var(--muted);font-size:11px}
  .st-helper{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:13px}
  .st-helper-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .st-context-row{margin-bottom:5px;line-height:1.4}
  .st-stat-row{color:var(--muted);margin-top:8px;line-height:1.5}
  .st-opener-chips{display:flex;flex-direction:column;gap:6px;margin-top:8px}
  .st-opener-chip{background:var(--navy2);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;color:var(--text);text-align:left;transition:border-color .15s;line-height:1.4}
  .st-opener-chip:hover{border-color:var(--gold)}
  .st-post-form{margin-bottom:18px}
  .st-form-row{display:flex;gap:8px;align-items:stretch;margin-bottom:8px}
  .st-player-sel{flex:1;background:var(--navy2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:10px 10px;font-size:14px;font-family:inherit}
  .st-textarea{width:100%;box-sizing:border-box;background:var(--navy2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;resize:vertical;min-height:66px;outline:none}
  .st-textarea:focus{border-color:var(--gold)}
  .st-char-row{display:flex;justify-content:space-between;align-items:center;margin-top:5px}
  .st-char-count{font-size:12px;color:var(--muted)}
  .st-char-count.warn{color:var(--bad)}
  .st-feed{display:flex;flex-direction:column;gap:10px}
  .st-post{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:13px 15px}
  .st-post-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
  .st-author{font-weight:700;font-size:14px}
  .st-time{font-size:11px;color:var(--muted)}
  .st-msg{font-size:14px;line-height:1.5;margin-bottom:10px;word-break:break-word}
  .st-reactions{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
  .st-react-btn{background:var(--navy2);border:1px solid var(--line);border-radius:18px;padding:4px 9px;font-size:12px;cursor:pointer;color:var(--text);transition:border-color .15s,background .15s;display:inline-flex;align-items:center;gap:3px;line-height:1}
  .st-react-btn.mine{border-color:var(--gold);background:rgba(212,175,55,.12)}
  .st-react-cnt{font-size:11px;color:var(--muted)}
  .st-del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 5px;border-radius:5px;margin-left:4px;transition:color .15s}
  .st-del-btn:hover{color:var(--bad)}
  .st-empty{color:var(--muted);font-size:14px;text-align:center;padding:28px 0}
  .st-divider{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .st-page-btn{background:var(--navy2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .st-page-btn:hover{border-color:var(--gold);color:var(--gold)}
  .st-page-info{font-size:12px;color:var(--muted);font-weight:600}

  /* Upcoming Games widget */
  .n4m-list{display:flex;flex-direction:column;gap:10px}
  .n4m-match{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:12px 14px}
  .n4m-kickoff{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .n4m-teams{font-weight:700;font-size:15px;margin-bottom:3px}
  .n4m-owners{font-size:12px;color:var(--gold);margin-bottom:8px}
  .n4m-reacts{display:flex;gap:6px}
  .mr-btn{background:var(--navy2);border:1px solid var(--line);border-radius:18px;padding:5px 11px;font-size:14px;cursor:pointer;color:var(--text);transition:border-color .15s,background .15s;display:inline-flex;align-items:center;gap:4px;line-height:1}
  .mr-btn.mine{border-color:var(--gold);background:rgba(212,175,55,.15)}
  .mr-btn.disabled{opacity:.45;cursor:default}
  .mr-cnt{font-size:12px;color:var(--muted);font-weight:600}

  /* Pool Tips */
  .tips-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:18px;position:relative;min-height:72px}
  .tips-card .section-title{margin-bottom:10px}
  .tip-text{font-size:14px;line-height:1.55;color:var(--text);min-height:42px;transition:opacity .3s}
  .tip-text.fade{opacity:0}
  .tip-dots{display:flex;gap:6px;margin-top:12px;justify-content:center}
  .tip-dot{width:7px;height:7px;border-radius:50%;background:var(--line);cursor:pointer;transition:background .2s}
  .tip-dot.active{background:var(--gold)}

  /* Auto-Draft Advisor */
  .btn-pop{background:#1aad9e;color:#fff;padding:13px 20px;letter-spacing:.4px;font-size:15px;font-weight:700;border-radius:11px;border:none;cursor:pointer;white-space:nowrap}
  .btn-pop:active{transform:translateY(1px)}
  .btn-pop:disabled{opacity:.5;cursor:default}
  .advisor-cards{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .advisor-card{background:var(--navy2);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .advisor-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .advisor-icon{font-size:22px;line-height:1;flex-shrink:0}
  .advisor-meta{flex:1;min-width:0}
  .advisor-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700}
  .advisor-team{font-size:17px;font-weight:800;color:var(--text)}
  .advisor-rank{font-size:13px;font-weight:700;color:var(--gold);white-space:nowrap;text-align:right}
  .advisor-desc{font-size:13px;color:var(--muted);line-height:1.5}
  .advisor-group{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.6;border-top:1px solid var(--line);padding-top:6px}

  /* Settings */
  .set-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
  .set-row:last-child{border-bottom:none}
  .set-row label{flex:1;font-size:14px}
  .set-row input{width:130px;background:var(--navy2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:9px 10px;text-align:right}
  .set-row input.name{text-align:left;width:170px}
  .btn-line{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .btn-ghost{background:var(--navy2);color:var(--text);border:1px solid var(--line);padding:10px 14px}
  .btn-ghost:disabled{opacity:.5;cursor:default}
  .btn-danger{background:#f1ddd2;color:#a23c1e;border:1px solid #e0b6a4;padding:10px 14px}
  .saved{font-size:12px;color:var(--good);opacity:0;transition:opacity .3s}
  .saved.show{opacity:1}
  .warn{color:var(--draw);font-size:12px;margin-top:8px}
  .foot{text-align:center;color:var(--muted);font-size:11px;padding:10px 0 0}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:11px 16px;border-radius:12px;font-size:13px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

  /* ===== Bracket tab ===== */

  .bkt-identity{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;flex-direction:column;gap:8px}
  .bkt-identity label{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}

  .bkt-status{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--muted);text-align:center;line-height:1.5}
  .bkt-status b{color:var(--text)}

  .bkt-round-header{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;margin:18px 2px 8px;display:flex;align-items:center;gap:8px}
  .bkt-round-header span{flex:1;height:1px;background:var(--line);display:block}

  .bkt-match{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:8px}
  .bkt-match-early{background:rgba(245,158,11,0.08);border-color:rgba(245,158,11,0.45)}
  .bkt-early-note{font-size:12px;color:#f59e0b;font-weight:600;margin:0 0 8px;text-align:center;line-height:1.4}
  .bkt-match-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
  .bkt-teams{display:flex;flex-direction:column;gap:6px}
  .bkt-team-btn{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:11px 13px;text-align:left;cursor:pointer;font-size:14px;font-weight:600;color:var(--text);transition:border-color .15s,background .15s;display:flex;align-items:center;justify-content:space-between;width:100%}
  .bkt-team-btn:hover{border-color:var(--gold-dim)}
  .bkt-team-btn.picked{background:rgba(200,147,49,.13);border-color:var(--gold);color:var(--gold)}
  .bkt-team-btn.tbd{color:var(--muted);font-style:italic;cursor:default}
  .bkt-team-btn.correct{background:rgba(47,125,112,.12);border-color:var(--good);color:var(--good)}
  .bkt-team-btn.wrong{background:rgba(189,86,56,.08);border-color:var(--bad);color:var(--bad);opacity:.7}
  .bkt-check{font-size:16px;flex-shrink:0}

  .bkt-tiebreaker{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:18px 0 14px}
  .bkt-tb-label{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .bkt-tb-desc{font-size:13px;color:var(--text);margin-bottom:10px;line-height:1.5}
  .bkt-tb-row{display:flex;align-items:center;gap:10px}

function computeTeamStats(){
  const rec = {};
  state.teams.forEach(t=>{ rec[t.name]={grp:t.grp,pld:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
  state.matches.forEach(m=>{
    const hs=m.home_score, as_=m.away_score;
    if(hs===null||as_===null||hs===undefined||as_===undefined) return;
    const h=rec[m.home_team], a=rec[m.away_team];
    if(!h||!a) return;
    h.pld++;a.pld++; h.gf+=hs;h.ga+=as_; a.gf+=as_;a.ga+=hs;
    if(hs>as_){h.w++;a.l++;}
    else if(hs<as_){a.w++;h.l++;}
    else{h.d++;a.d++;}
  });
  Object.values(rec).forEach(r=>{ r.gd=r.gf-r.ga; r.pts=r.w*winPts()+r.d*drawPts()+r.l*lossPts(); });
  return rec;
}

    const ppg = gamesPlayed > 0 ? groupPts / gamesPlayed : 0;
    const bktPts = computeBracketScore(p.id).pts;
    const pts = groupPts + bktPts;
    return {player:p, owned, pts, groupPts, bktPts, w, d, l, gf, gamesPlayed, ppg, count:owned.length};
  });
  rows.sort((a,b)=> b.pts-a.pts || b.w-a.w || b.gf-a.gf || a.player.sort_order-b.player.sort_order);
  return {rows, rec};
}

function computeFunFacts(){
  const assigned = state.teams.filter(t=>t.owner_id);
  if(assigned.length < 8) return [];

  const playerStats = state.players.map(p=>{
    const owned = state.teams.filter(t=>t.owner_id===p.id);
    const data = owned.map(t=>({team:t, d:TEAM_DATA[t.name]})).filter(x=>x.d);
    if(!data.length) return null;
    const ranks = data.map(x=>x.d.rank);
    const minRank = Math.min(...ranks);
    const maxRank = Math.max(...ranks);
    const avgRank = ranks.reduce((s,r)=>s+r,0)/ranks.length;
    const totalTitles = data.reduce((s,x)=>s+x.d.wcTitles,0);
    const confCount = new Set(data.map(x=>x.d.conf)).size;
    const debutTeams = data.filter(x=>x.d.debut);
    const bestTeam = data.find(x=>x.d.rank===minRank);
    const worstTeam = data.find(x=>x.d.rank===maxRank);
    return {player:p, owned, data, minRank, maxRank, avgRank, totalTitles, confCount, debutTeams, bestTeam, worstTeam};
  }).filter(Boolean);

  if(!playerStats.length) return [];

  // === Live facts — go first if data is available ===
  const liveFacts = [];
  const played = state.matches.filter(m=>m.home_score!==null && m.away_score!==null);

  if(played.length > 0){
    // Goals scored per player
    const goalsByPlayer = {};
    state.players.forEach(p=>{ goalsByPlayer[p.id]=0; });
    played.forEach(m=>{
      const homeOwner = state.teams.find(t=>t.name===m.home_team)?.owner_id;
      const awayOwner = state.teams.find(t=>t.name===m.away_team)?.owner_id;
      if(homeOwner) goalsByPlayer[homeOwner]=(goalsByPlayer[homeOwner]||0)+m.home_score;
      if(awayOwner) goalsByPlayer[awayOwner]=(goalsByPlayer[awayOwner]||0)+m.away_score;
    });
    const [topId, topGoals] = Object.entries(goalsByPlayer).sort((a,b)=>b[1]-a[1])[0]||[];
    if(topGoals>0){
      const gp = state.players.find(p=>p.id===topId);
      if(gp) liveFacts.push(`⚽ <b>${esc(gp.name)}</b> leads the pool with <b>${topGoals} goals</b> scored by their teams so far.`);
    }

    // Undefeated players (≥2 matches played, zero losses)
    const matchesByPlayer = {};
    state.players.forEach(p=>{ matchesByPlayer[p.id]={played:0,lost:0}; });
    played.forEach(m=>{
      const homeOwner = state.teams.find(t=>t.name===m.home_team)?.owner_id;
      const awayOwner = state.teams.find(t=>t.name===m.away_team)?.owner_id;
      if(homeOwner){
        matchesByPlayer[homeOwner].played++;
        if(m.home_score < m.away_score) matchesByPlayer[homeOwner].lost++;
      }
      if(awayOwner){
        matchesByPlayer[awayOwner].played++;
        if(m.away_score < m.home_score) matchesByPlayer[awayOwner].lost++;
      }
    });
    const undefeated = state.players.filter(p=>{ const s=matchesByPlayer[p.id]; return s&&s.played>=2&&s.lost===0; });
    if(undefeated.length===1)
      liveFacts.push(`🛡️ <b>${esc(undefeated[0].name)}</b> is the last undefeated player — none of their teams have lost yet.`);
    else if(undefeated.length>1&&undefeated.length<=5)
      liveFacts.push(`🛡️ Still undefeated: ${undefeated.map(p=>`<b>${esc(p.name)}</b>`).join(', ')} — none of their teams have lost yet.`);

    // Most wins
    const winsByPlayer = {};
    state.players.forEach(p=>{ winsByPlayer[p.id]=0; });
    played.forEach(m=>{
      const homeOwner = state.teams.find(t=>t.name===m.home_team)?.owner_id;
      const awayOwner = state.teams.find(t=>t.name===m.away_team)?.owner_id;
      if(m.home_score > m.away_score && homeOwner) winsByPlayer[homeOwner]=(winsByPlayer[homeOwner]||0)+1;
      if(m.away_score > m.home_score && awayOwner) winsByPlayer[awayOwner]=(winsByPlayer[awayOwner]||0)+1;
    });
    const [topWinId, topWins] = Object.entries(winsByPlayer).sort((a,b)=>b[1]-a[1])[0]||[];
    if(topWins>0){
      const wp = state.players.find(p=>p.id===topWinId);
      if(wp) liveFacts.push(`🏅 <b>${esc(wp.name)}</b> has the most team wins — <b>${topWins} W</b> across their squad.`);
    }

    // Points-per-game efficiency (interesting when efficiency leader ≠ raw points leader)
    if(played.length >= 2){
      const {rows:lbRows} = computeLeaderboard();
      const qual = lbRows.filter(r=>r.gamesPlayed>=2);
      if(qual.length>=2){
        const byPpg = [...qual].sort((a,b)=>b.ppg-a.ppg);
        const effTop = byPpg[0];
        const ptsTop = lbRows[0];
        if(effTop.player.id !== ptsTop.player.id){
          liveFacts.push(`📐 <b>${esc(effTop.player.name)}</b> leads the pool in points per game — <b>${effTop.ppg.toFixed(1)} pts/match</b> while <b>${esc(ptsTop.player.name)}</b> leads in total points. The standings could look different once schedules even out.`);
        } else if(byPpg.length>=2){
          const threat = byPpg[1];
          const threatProj = Math.round(threat.ppg * 18);
          const leaderProj = Math.round(effTop.ppg * 18);
          if(leaderProj - threatProj <= 3){
            liveFacts.push(`🚀 <b>${esc(threat.player.name)}</b> is projecting to <b>${threatProj} pts</b> at current pace — within striking distance of <b>${esc(ptsTop.player.name)}</b>'s projected ${leaderProj}.`);
          }
        }
      }
    }

    // Highest-scoring single team in the tournament
    const teamGoals = {};
    played.forEach(m=>{
      teamGoals[m.home_team]=(teamGoals[m.home_team]||0)+m.home_score;
      teamGoals[m.away_team]=(teamGoals[m.away_team]||0)+m.away_score;
    });
    const [topTeam, topTeamGoals] = Object.entries(teamGoals).sort((a,b)=>b[1]-a[1])[0]||[];
    if(topTeamGoals>=3){
      const tOwner = state.teams.find(t=>t.name===topTeam)?.owner_id;
      const tPlayer = tOwner ? state.players.find(p=>p.id===tOwner) : null;
      if(tPlayer) liveFacts.push(`🔥 <b>${esc(topTeam)}</b> (${esc(tPlayer.name)}'s) is the tournament's top scorer so far — <b>${topTeamGoals} goals</b> and counting.`);
    }
  }

  // === Static facts — used as fallback / filler ===
  const staticFacts = [];

  // Defending champion (Argentina)
  const argOwner = playerStats.find(s=>s.owned.some(t=>t.name==='Argentina'));
  if(argOwner) staticFacts.push(`🏆 <b>${esc(argOwner.player.name)}</b> holds the defending champions — Argentina is going for back-to-back.`);

  // Best average FIFA ranking
  const bestAvg = playerStats.reduce((best,s)=>s.avgRank<best.avgRank?s:best);
  staticFacts.push(`⭐ <b>${esc(bestAvg.player.name)}</b> has the strongest stable — #${Math.round(bestAvg.avgRank)} avg FIFA ranking across their ${bestAvg.owned.length} teams.`);

  // Most combined World Cup titles
  const mostTitles = playerStats.reduce((best,s)=>s.totalTitles>best.totalTitles?s:best);
  if(mostTitles.totalTitles>0){
    const titleTeams = mostTitles.data.filter(x=>x.d.wcTitles>0).map(x=>`${esc(x.team.name)} ×${x.d.wcTitles}`).join(', ');
    staticFacts.push(`🥇 <b>${esc(mostTitles.player.name)}</b> has the most combined WC titles — ${mostTitles.totalTitles} total: ${titleTeams}.`);
  }

  // Lowest-ranked team
  const bottomRanked = playerStats.reduce((worst,s)=>s.maxRank>worst.maxRank?s:worst);
  if(bottomRanked.worstTeam) staticFacts.push(`📉 <b>${esc(bottomRanked.player.name)}</b> is riding the biggest long shot — ${esc(bottomRanked.worstTeam.team.name)} is FIFA #${bottomRanked.maxRank}.`);

  // Live facts first, then static; cap at 3
  return [...liveFacts, ...staticFacts].slice(0,3);
}

/* ====================== Score sync ====================== */
async function syncScores(){
  const btn = $("#syncBtn");
  if(btn){ btn.disabled=true; btn.textContent="Syncing…"; }
  try{
    const resp = await fetch(`${SUPABASE_URL}/functions/v1/sync-scores`, {method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    const data = await resp.json();
    if(data.ok && !data.skipped){
      toast(data.updated>0 ? `Synced — ${data.updated} score${data.updated!==1?'s':''} updated` : 'All scores already current');
      await loadAll(); renderCurrent();
    } else if(data.skipped){
      toast("Just synced — please wait a moment");
    } else {
      toast(data.error?.slice(0,60) || "Sync failed — check API key setup");
    }
  } catch(e){
    toast("Sync error — check connection");
  } finally{
    if(btn){ btn.disabled=false; btn.textContent="Sync scores now"; }
  }
}

/* ====================== Data load + realtime ====================== */
async function loadAll(){
  const [pl,tm,mt,st,rc,sk,sr,mr,bp,bt,br] = await Promise.all([
    sb.from("players").select("*").order("sort_order"),
    sb.from("teams").select("*").order("grp").order("pos"),
    sb.from("matches").select("*").order("match_date",{nullsFirst:false}).order("id"),
    sb.from("settings").select("*"),
    sb.from("recaps").select("*").order("created_at",{ascending:false}),
    sb.from("smacktalk").select("*").order("created_at",{ascending:false}),
    sb.from("smacktalk_reactions").select("*"),
    sb.from("match_reaction_counts").select("*"),
    sb.from("bracket_picks").select("*"),
    sb.from("bracket_tiebreaker").select("*"),
    sb.from("bracket_results").select("*"),
  ]);
  if(pl.error||tm.error||mt.error||st.error){ console.error(pl.error||tm.error||mt.error||st.error); toast("Sync error — check connection"); }
  state.players               = pl.data||[];
  state.teams                 = tm.data||[];
  state.matches               = mt.data||[];
  state.recaps                = rc.data||[];
  state.smacktalk             = sk.data||[];
  state.smacktalk_reactions   = sr.data||[];
  state.match_reaction_counts = mr.data||[];
  state.bracket_picks         = bp.data||[];
  state.bracket_tiebreaker    = bt.data||[];
  state.bracket_results       = br.data||[];
  state.settings = {};
  (st.data||[]).forEach(r=> state.settings[r.key]=r.value);
}

  setTimeout(()=>{

          .map(o=>`<div class="teamline"><span>${esc(o.t.name)} <span style="color:var(--muted)">(${o.t.grp})</span></span><b>${o.p} pt${o.p===1?'':'s'}</b></div>`).join("")

/* ---- Auto-Draft Advisor ---- */
function computeAdvisorScore(team, selectedPlayer, rules, lb){
  const ht = team.name;
  const htData = TEAM_DATA[ht];
  const played = state.matches.filter(m=>m.home_score!==null&&m.away_score!==null).length;
  const reasons=[]; let score=0;

  function add(key, labelOverride){
    const r=rules[key]; if(!r?.enabled) return;
    score+=r.weight;
    reasons.push({emoji:r.emoji, label:labelOverride||r.label});
  }

  // Evaluate each group opponent that's already owned
  const groupOpponents = state.teams.filter(t=>t.grp===team.grp&&t.name!==ht);
  groupOpponents.forEach(opTeam=>{
    const opOwner = opTeam.owner_id ? playerById(opTeam.owner_id) : null;
    if(!opOwner) return;
    const at=opTeam.name, atData=TEAM_DATA[at];
    const match=state.matches.find(m=>(m.home_team===ht&&m.away_team===at)||(m.home_team===at&&m.away_team===ht));
    const round=match?.round||1;
    const hn=selectedPlayer.name, an=opOwner.name;

    // Couple / sibling
    if(COUPLES.some(([a,b])=>(nameFits(hn,a)&&nameFits(an,b))||(nameFits(hn,b)&&nameFits(an,a))))
      add("couple",`vs ${an}'s ${at} — couple match-up`);
    if(SIBLINGS.some(([a,b])=>(nameFits(hn,a)&&nameFits(an,b))||(nameFits(hn,b)&&nameFits(an,a))))
      add("sibling",`vs ${an}'s ${at} — sibling showdown`);

    // Standings swing (both in top 4)
    if(played>0){
      const pos={}; lb.rows.forEach((r,i)=>pos[r.player.id]=i+1);
      const sp=pos[selectedPlayer.id]||9, op=pos[opOwner.id]||9;
      if(sp<=4&&op<=4) add("swing",`vs #${op} ${an} — standings impact`);
    }

    // Rivalry
    if(RIVALRIES.has(`${ht}|${at}`)||RIVALRIES.has(`${at}|${ht}`))
      add("rivalry",`${ht} vs ${at} — storied rivalry`);

    // Leader's team
    if(lb.rows.length&&opOwner.id===lb.rows[0].player.id)
      add("leader",`vs pool leader ${an}'s ${at}`);

    // Ranking gap
    if(htData&&atData&&Math.abs(htData.rank-atData.rank)>=30){
      const fav=htData.rank<atData.rank?ht:at, dog=htData.rank<atData.rank?at:ht;
      add("rankgap",`Could upset ${fav} — upset watch`);
    }

    // Final group matchday
    if(round===3) add("groupfinal","Meets in final group matchday");

    // Club teammates
    if(CLUB_CONNECTIONS.has(`${ht}|${at}`)||CLUB_CONNECTIONS.has(`${at}|${ht}`))
      add("clubmates",`${ht} vs ${at} — club teammates`);
  });

  // Team-level rules (apply regardless of opponents)
  if(HOST_NATIONS.has(ht)) add("host",`${ht} — playing on home turf`);
  if(ht==="Argentina") add("defending","Argentina — defending world champions");
  if(htData){
    const sameConf=groupOpponents.some(t=>{ const d=TEAM_DATA[t.name]; return d&&d.conf===htData.conf; });
    if(sameConf){
      const cn={UEFA:"European",CONMEBOL:"South American",CONCACAF:"CONCACAF",CAF:"African",AFC:"Asian",OFC:"Oceanian"};
      add("continent",`${cn[htData.conf]||htData.conf} derby in group`);
    }
  }

  return {score, reasons};
}

function computeGroupSoftness(team){
  const opponents=state.teams.filter(t=>t.grp===team.grp&&t.name!==team.name);
  if(!opponents.length) return 0;
  const total=opponents.reduce((s,t)=>s+(TEAM_DATA[t.name]?.rank||50),0);
  return total/opponents.length; // higher avg rank = weaker opponents = softer group
}

function expectedPointsVsOpponent(myRank, oppRank){
  // Probability model based on FIFA ranking gap
  // diff > 0 means we are better ranked (lower number = better)
  const diff = oppRank - myRank;
  let pWin, pDraw;
  if     (diff >= 40) { pWin=0.70; pDraw=0.15; }
  else if(diff >= 20) { pWin=0.55; pDraw=0.20; }
  else if(diff >=  5) { pWin=0.45; pDraw=0.25; }
  else if(diff >= -5) { pWin=0.35; pDraw=0.30; }
  else if(diff >=-20) { pWin=0.25; pDraw=0.30; }
  else if(diff >=-40) { pWin=0.15; pDraw=0.20; }
  else                { pWin=0.10; pDraw=0.15; }
  return pWin * 3 + pDraw * 1;
}

function expectedGroupPoints(team){
  const myRank = TEAM_DATA[team.name]?.rank || 99;
  const opponents = state.teams.filter(t=>t.grp===team.grp&&t.name!==team.name);
  return opponents.reduce((sum, opp)=>{
    const oppRank = TEAM_DATA[opp.name]?.rank || 50;
    return sum + expectedPointsVsOpponent(myRank, oppRank);
  }, 0);
}

function runAdvisor(selectedPlayer){
  const resultsEl=document.getElementById("advisor-results");
  if(!resultsEl) return;
  const rules=getMatchupRules();
  const lb=computeLeaderboard();

  const myTeams=state.teams.filter(t=>t.owner_id===selectedPlayer.id);
  if(myTeams.length>=TEAMS_PER_PLAYER){
    resultsEl.innerHTML=`<p class="hint" style="margin-top:12px">${esc(selectedPlayer.name)} already has ${TEAMS_PER_PLAYER} teams — fully drafted!</p>`;
    return;
  }

  const myGroups=new Set(myTeams.map(t=>t.grp));
  const eligible=state.teams.filter(t=>!t.owner_id&&!myGroups.has(t.grp));

  if(!eligible.length){
    const grpList=[...myGroups].join(", ");
    resultsEl.innerHTML=`<p class="hint" style="margin-top:12px">No eligible teams remaining outside groups ${esc(grpList)}.</p>`;
    return;
  }

  // Score every eligible team — expected pts is primary, match-up interest is tiebreaker
  const scored=eligible.map(team=>{
    const d=TEAM_DATA[team.name]||{rank:99};
    const {score:matchupScore,reasons}=computeAdvisorScore(team,selectedPlayer,rules,lb);
    const expPts=expectedGroupPoints(team);
    return {team, rank:d.rank, matchupScore, reasons, expPts};
  });

  // Pick 1: Best Available — highest expected group-stage points
  const byExpPts=[...scored].sort((a,b)=>b.expPts-a.expPts||b.matchupScore-a.matchupScore);
  const bestAvailable=byExpPts[0];

  // Pick 2: Match-Up Magnet — highest match-up interest score, but only among teams
  // at or above the median expected-pts threshold (prevents weak teams winning on rule triggers)
  const sortedForMedian=[...scored].sort((a,b)=>a.expPts-b.expPts);
  const medianExpPts=sortedForMedian.length?sortedForMedian[Math.floor(sortedForMedian.length/2)].expPts:0;
  const magnetPool=[...scored]
    .filter(s=>s.team.name!==bestAvailable.team.name&&s.expPts>=medianExpPts)
    .sort((a,b)=>b.matchupScore-a.matchupScore||b.expPts-a.expPts);
  const matchUpMagnet=magnetPool[0]
    ||[...scored].filter(s=>s.team.name!==bestAvailable.team.name).sort((a,b)=>b.expPts-a.expPts)[0];

  // Pick 3: Under the Radar — best expected pts from a team ranked outside FIFA top 25
  // (sleeper pick: not the obvious choice, but quietly solid)
  const used=new Set([bestAvailable?.team.name,matchUpMagnet?.team.name]);
  const radarPool=[...scored]
    .filter(s=>!used.has(s.team.name)&&s.rank>25)
    .sort((a,b)=>b.expPts-a.expPts||b.matchupScore-a.matchupScore);
  const underTheRadar=radarPool[0]
    ||[...scored].filter(s=>!used.has(s.team.name)).sort((a,b)=>b.expPts-a.expPts)[0];

  const defs=[
    bestAvailable && {
      s:bestAvailable, icon:"🏆", label:"Best Available",
      desc:`~${bestAvailable.expPts.toFixed(1)} expected group-stage pts — the strongest overall pick on the board.`
    },
    matchUpMagnet && {
      s:matchUpMagnet, icon:"⚽", label:"Match-Up Magnet",
      desc:matchUpMagnet.matchupScore>0
        ?`~${matchUpMagnet.expPts.toFixed(1)} expected pts, plus creates high-interest group-stage match-ups for you.`
        :`~${matchUpMagnet.expPts.toFixed(1)} expected pts — solid pick with the best match-up potential of what's left.`
    },
    underTheRadar && {
      s:underTheRadar, icon:"🎲", label:"Under the Radar",
      desc:`~${underTheRadar.expPts.toFixed(1)} expected pts — FIFA #${underTheRadar.rank}, not the flashiest name but the best sleeper available.`
    },
  ].filter(Boolean);

  let html=`<div class="advisor-cards">`;
  defs.forEach(({s,icon,label,desc})=>{
    // Build group context line
    const groupTeams=state.teams.filter(t=>t.grp===s.team.grp&&t.name!==s.team.name);
    const groupStr=groupTeams.map(t=>{
      const o=t.owner_id?playerById(t.owner_id):null;
      return esc(t.name)+(o?` <span style="color:var(--gold)">(${esc(o.name)})</span>`:'');
    }).join(' · ');

    html+=`<div class="advisor-card">
      <div class="advisor-header">
        <span class="advisor-icon">${icon}</span>
        <div class="advisor-meta">
          <div class="advisor-label">${label}</div>
          <div class="advisor-team">${esc(s.team.name)}</div>
        </div>
        <div class="advisor-rank">FIFA #${s.rank}<br><span style="font-size:11px;color:var(--muted);font-weight:500">Group ${s.team.grp}</span></div>
      </div>
      <div class="advisor-desc">${desc}</div>
      ${s.reasons.length?`<div class="mtw-reasons" style="margin-top:6px">${s.reasons.map(r=>`<span class="mtw-badge">${r.emoji} ${esc(r.label)}</span>`).join("")}</div>`:''}
      <div class="advisor-group">Also in Group ${s.team.grp}: ${groupStr||'<span style="color:var(--muted)">—</span>'}</div>
    </div>`;
  });
  html+=`</div>`;
  resultsEl.innerHTML=html;
}

/* ---- Draft ---- */
function renderDraft(){
  const drafted = state.players.every(p=>p.slot) && state.players.length===8;
  const ordered = [...state.players].filter(p=>p.slot).sort((a,b)=>a.slot-b.slot);
  let html = `<div class="card">
    <h2>Snake Draft</h2>
    <p class="hint">${drafted ? 'Draft order is set. The order flips each round; everyone ends with '+TEAMS_PER_PLAYER+' teams. Picks are assigned on the Teams tab.' : 'The draft order has not been set yet.'}</p>
    ${isAdmin ? `<button class="btn-gold" id="randBtn" style="max-width:260px">${drafted?'Re-randomize draft order':'Randomize draft order'}</button>
    ${drafted?'<p class="warn">Re-randomizing overwrites the current order (team assignments stay).</p>':''}` : ''}
  </div>`;

  if(drafted){
    html += `<div class="card"><div class="section-title">Draft Order</div><div class="draft-grid"><table>
      <thead><tr><th>Rd</th>${ordered.map(p=>`<th>${esc(p.name)}</th>`).join("")}</tr></thead><tbody>`;
    for(let r=1;r<=DRAFT_ROUNDS;r++){
      const asc = r%2===1;
      const cells = ordered.map(p=>{
        const posInRound = asc ? p.slot : (9 - p.slot);
        const pickNo = (r-1)*8 + posInRound;
        return {p, pickNo};
      });
      html+=`<tr><td><b>${r}</b> <span class="arrow">${asc?'→':'←'}</span></td>${
        ordered.map(p=>{ const c=cells.find(c=>c.p.id===p.id); return `<td><span class="pk">#${c.pickNo}</span>${esc(p.name.split('/')[0])}</td>`; }).join("")
      }</tr>`;
    }
    html+=`</tbody></table></div><p class="hint" style="margin-top:10px">Round 1 picks left→right; even rounds snake back right→left. 48 picks total.</p></div>`;
  }
  $("#tab-draft").innerHTML = html + `<div id="advisor-container"></div>`;
  const rb=$("#randBtn"); if(rb) rb.addEventListener("click",randomizeDraft);
  renderAutoDraftAdvisor();
}

async function randomizeDraft(){
  if(state.players.some(p=>p.slot) && !confirm("Re-randomize the draft order? Current order will be overwritten.")) return;
  const ids = state.players.map(p=>p.id);
  for(let i=ids.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [ids[i],ids[j]]=[ids[j],ids[i]]; }
  const {error} = await rpc("admin_randomize_draft", {p_ids:ids});
  if(error) return;
  await loadAll(); renderDraft(); toast("Draft order randomized");
}

/* ---- Match to Watch ---- */
function getMatchupRules(){
  const saved = state.settings["matchup_rules"];
  if(!saved) return JSON.parse(JSON.stringify(DEFAULT_RULES));
  try{
    const parsed = JSON.parse(saved);
    const merged = {};
    Object.keys(DEFAULT_RULES).forEach(k=>{
      merged[k] = parsed[k] ? {...DEFAULT_RULES[k], ...parsed[k]} : {...DEFAULT_RULES[k]};
    });
    return merged;
  } catch(e){ return JSON.parse(JSON.stringify(DEFAULT_RULES)); }
}

function ownerOf(teamName){
  const t = state.teams.find(x=>x.name===teamName);
  if(!t||!t.owner_id) return null;
  return playerById(t.owner_id);
}

function nameFits(playerName, frag){
  return playerName.toLowerCase().includes(frag.toLowerCase());
}

function scoreMatch(match, rules, lb){
  const {home_team:ht, away_team:at, round} = match;
  const homeOwner = ownerOf(ht);
  const awayOwner = ownerOf(at);
  const homeData  = TEAM_DATA[ht];
  const awayData  = TEAM_DATA[at];
  const played = state.matches.filter(m=>m.home_score!==null&&m.away_score!==null).length;
  const reasons=[]; let score=0;

  function add(key, labelOverride){
    const r=rules[key]; if(!r?.enabled) return;
    score+=r.weight;
    reasons.push({emoji:r.emoji, label:labelOverride||r.label});
  }

  // Couple / sibling (both teams must have owners)
  if(homeOwner&&awayOwner){
    const hn=homeOwner.name, an=awayOwner.name;
    if(COUPLES.some(([a,b])=>(nameFits(hn,a)&&nameFits(an,b))||(nameFits(hn,b)&&nameFits(an,a))))
      add("couple",`${hn} vs ${an} — couple showdown`);
    if(SIBLINGS.some(([a,b])=>(nameFits(hn,a)&&nameFits(an,b))||(nameFits(hn,b)&&nameFits(an,a))))
      add("sibling",`${hn} vs ${an} — sibling rivalry`);
  }

  // Pool standings swing — both owners currently in top 4, after ≥1 match played
  if(homeOwner&&awayOwner&&homeOwner.id!==awayOwner.id&&played>0){
    const pos={};
    lb.rows.forEach((r,i)=>pos[r.player.id]=i+1);
    const hp=pos[homeOwner.id]||9, ap=pos[awayOwner.id]||9;
    if(hp<=4&&ap<=4) add("swing",`#${hp} ${homeOwner.name} vs #${ap} ${awayOwner.name} — standings on the line`);
  }

  // High-stakes — the top-2 FIFA-ranked owned teams face each other
  if(homeData&&awayData){
    const ownedRanks=state.teams.filter(t=>t.owner_id).map(t=>TEAM_DATA[t.name]?.rank).filter(Boolean).sort((a,b)=>a-b);
    if(ownedRanks.length>=2){
      const [r1,r2]=ownedRanks;
      const ranks=[homeData.rank,awayData.rank];
      if(ranks.includes(r1)&&ranks.includes(r2))
        add("highstakes",`FIFA #${homeData.rank} vs #${awayData.rank} — pool's top two seeds`);
    }
  }

  // Historic rivalry
  if(RIVALRIES.has(`${ht}|${at}`)) add("rivalry",`${ht} vs ${at} — storied rivalry`);

  // Host nation
  const hostTeam=HOST_NATIONS.has(ht)?ht:HOST_NATIONS.has(at)?at:null;
  if(hostTeam) add("host",`${hostTeam} — playing on home turf`);

  // Leader's team
  if(lb.rows.length&&(homeOwner||awayOwner)){
    const leaderId=lb.rows[0].player.id;
    if(homeOwner?.id===leaderId||awayOwner?.id===leaderId){
      const ln=(homeOwner?.id===leaderId?homeOwner:awayOwner).name;
      add("leader",`${ln}'s team — current pool leader`);
    }
  }

  // Defending champion
  if(ht==="Argentina"||at==="Argentina") add("defending","Argentina — defending world champions");

  // Ranking gap / upset watch (30+ spots apart)
  if(homeData&&awayData){
    const gap=Math.abs(homeData.rank-awayData.rank);
    if(gap>=30){
      const fav=homeData.rank<awayData.rank?ht:at;
      const dog=homeData.rank<awayData.rank?at:ht;
      const favRk=Math.min(homeData.rank,awayData.rank);
      const dogRk=Math.max(homeData.rank,awayData.rank);
      add("rankgap",`${dog} (#${dogRk}) could upset ${fav} (#${favRk})`);
    }
  }

  // Final group matchday
  if(round===3) add("groupfinal","Final group matchday — advancement at stake");

  // Continent derby — same confederation
  if(homeData&&awayData&&homeData.conf===awayData.conf){
    const cn={UEFA:"European",CONMEBOL:"South American",CONCACAF:"CONCACAF",CAF:"African",AFC:"Asian",OFC:"Oceanian"};
    add("continent",`${cn[homeData.conf]||homeData.conf} derby`);
  }

  // Club teammates
  if(CLUB_CONNECTIONS.has(`${ht}|${at}`)) add("clubmates","Club teammates on opposite sides");

  return {score, reasons};
}

function findMatchToWatch(rules){
  // Sort by actual kickoff time (kickoff_utc), fall back to match_date+id
  const upcoming=state.matches
    .filter(m=>m.home_score===null&&m.away_score===null)
    .sort((a,b)=>{
      if(a.kickoff_utc&&b.kickoff_utc) return new Date(a.kickoff_utc)-new Date(b.kickoff_utc);
      return (a.match_date||'').localeCompare(b.match_date||'')||a.id-b.id;
    })
    .slice(0,8); // wider window gives the scoring algo more candidates
  if(!upcoming.length) return null;
  const lb=computeLeaderboard();
  let best=null, bestScore=-1;
  upcoming.forEach(m=>{
    const {score,reasons}=scoreMatch(m,rules,lb);
    if(score>bestScore){ bestScore=score; best={match:m,score,reasons}; }
  });
  // If nothing scored (all zero), fall back to the chronologically next match
  if(!best||bestScore===0) best={match:upcoming[0],score:0,reasons:[]};
  return best;
}

      });
      container.querySelectorAll(".mtw-toggle[data-rule]").forEach(inp=>{
        const k=inp.dataset.rule; if(updated[k]) updated[k].enabled=inp.checked;
      });
      const {error}=await rpc("admin_set_setting",{p_key:"matchup_rules",p_value:JSON.stringify(updated)});
      if(error) return;
      await loadAll(); renderMatchToWatch(); toast("Rules saved");
    });

/* ====================== Bracket ====================== */

// Get both teams for a given match number, from picks cascaded through the bracket
function bktGetTeams(matchNum, picks, mode){
  // R32: teams come directly from data source
  if(matchNum <= 88){
    // bracket_results takes priority, fall back to hardcoded R32_REAL_TEAMS
    const res = state.bracket_results.find(r=>r.match_num===matchNum);
    if(res) return [res.team_a, res.team_b];
    const fallback = R32_REAL_TEAMS[matchNum];
    return fallback ? fallback : ["TBD","TBD"];
  }
  // R16+: derive from feeds
  const feeds = BRACKET_FEEDS[matchNum];
  if(!feeds) return ["TBD","TBD"];
  return feeds.map(f=>{
    if(f > 0){
      // winner of match f
      if(mode === "real"){
        const res = state.bracket_results.find(r=>r.match_num===f);
        if(res?.winner) return res.winner;
      }
      return picks[f] || "TBD";
    } else {
      // loser of match abs(f)
      const absF = Math.abs(f);
      if(mode === "real"){
        const res = state.bracket_results.find(r=>r.match_num===absF);
        if(res?.winner){
          const [a,b] = bktGetTeams(absF, picks, mode);
          return [a,b].find(t=>t!==res.winner) || "TBD";
        }
      }
      // Can't derive loser from picks alone until result is known
      return "TBD";
    }
  });
}

// Get the official result for a match
function bktGetResult(matchNum){
  return state.bracket_results.find(r=>r.match_num===matchNum) || null;
}

// Compute knockout points for a player from state
function computeBracketScore(playerId){
  const myPicks = state.bracket_picks.filter(p=>p.player_id===playerId);
  let pts = 0, correct = 0, total = myPicks.length;
  myPicks.forEach(p=>{
    if(p.is_correct === true){ pts += 3; correct++; }
  });
  const tb = state.bracket_tiebreaker.find(t=>t.player_id===playerId);
  return {pts, correct, total, tbGoals: tb?.goals_prediction ?? null};
}

async function onBktPlayerChange(pid){
  bktPlayerId = pid;
  bktPicks = {};
  bktTbGoals = null;
  bktSubmitted = false;
  bktPin = null;
  bktPinVerified = false;
  bktOverrideMatches = [];
  bktNeedsPin = false;
  if(pid){
    const myPicks = state.bracket_picks.filter(p=>p.player_id===pid);
    if(myPicks.length > 0){
      bktSubmitted = true;
      myPicks.forEach(p=>{ bktPicks[p.match_num] = p.picked_team; });
      const tb = state.bracket_tiebreaker.find(t=>t.player_id===pid);
      if(tb) bktTbGoals = tb.goals_prediction;
      // Compute matches editable post-deadline: directly overridden + their downstream
      const directOverrides = myPicks.filter(p=>p.commissioner_at).map(p=>p.match_num);
      if(directOverrides.length > 0){
        function depOn(mn, target){ const f=BRACKET_FEEDS[mn]; return f&&f.some(x=>x===target||depOn(x,target)); }
        const editable = new Set(directOverrides);
        BRACKET_ROUNDS.flatMap(r=>r.matches).filter(mn=>mn>88).forEach(mn=>{
          directOverrides.forEach(ov=>{ if(depOn(mn,ov)) editable.add(mn); });
        });
        bktOverrideMatches = [...editable];
      }
    }
    try{ bktPin = localStorage.getItem("wc_bkt_pin_"+pid) || null; }catch(e){}
    if(bktSubmitted && !bktPin){
      // Player has picks but no cached PIN — check if they ever set one (e.g. random-assigned player)
      const {data: pinExists} = await sb.rpc("bracket_pin_is_set", {p_player_id: pid});
      if(pinExists === false) bktNeedsPin = true;
    }
    // Auto-verify if cached PIN exists — needed pre-deadline (PIN gate) or post-deadline (override editing)
    if(bktPin && bktSubmitted && !bktNeedsPin && (new Date() < BRACKET_DEADLINE || bktOverrideMatches.length > 0)){
      const {data} = await sb.rpc("verify_bracket_pin", {p_player_id: pid, p_pw: bktPin});
      if(data) bktPinVerified = true;
    }
  }
  renderBracket();
}

function buildBracketPicksHtml(mode, picks, results){
  let html = "";
  BRACKET_ROUNDS.forEach(round=>{
    html += `<div class="bkt-round-header">${round.label}<span></span></div>`;
    round.matches.forEach(mn=>{
      const [teamA, teamB] = bktGetTeams(mn, picks, mode);
      const picked = picks[mn];
      const res = (mode==="real") ? bktGetResult(mn) : null;
      const resultWinner = res?.winner || null;
      const tbd = teamA==="TBD" || teamB==="TBD";

      // Determine button states
      const stateA = resultWinner
        ? (teamA===resultWinner ? "correct" : (picked===teamA ? "wrong" : ""))
        : (picked===teamA ? "picked" : (tbd&&!teamA.includes("TBD") ? "" : ""));
      const stateB = resultWinner
        ? (teamB===resultWinner ? "correct" : (picked===teamB ? "wrong" : ""))
        : (picked===teamB ? "picked" : "");

      const checkA = resultWinner && teamA===resultWinner ? "✅" : (resultWinner && picked===teamA && teamA!==resultWinner ? "❌" : "");
      const checkB = resultWinner && teamB===resultWinner ? "✅" : (resultWinner && picked===teamB && teamB!==resultWinner ? "❌" : "");

      const m73Locked = mn === 73 && new Date() >= MATCH73_DEADLINE;
      const isOverrideEditable = bktOverrideMatches.includes(mn);
      const canPick = !resultWinner && !tbd && !m73Locked && (new Date() < BRACKET_DEADLINE || isOverrideEditable);
      const label = mn <= 88 && mode==="real" ? `<div class="bkt-match-label">Match ${mn} · ${R32_LABELS[mn]||""}</div>` : `<div class="bkt-match-label">Match ${mn}</div>`;

      const earlyNoteHtml = mn === 73 ? (m73Locked
        ? `<div class="bkt-early-note">🔒 Locked at 11:59 AM PT${!picked ? " — random pick will be assigned (0 pts)" : ""}</div>`
        : `<div class="bkt-early-note">⚡ Locks today at 11:59 AM PT — no pick = random assignment (0 pts)</div>`)
        : "";
      const matchExtraClass = mn === 73 ? " bkt-match-early" : isOverrideEditable ? " bkt-match-early" : "";

      const pickMeta = isAdmin && bktPlayerId
        ? state.bracket_picks.find(p=>p.player_id===bktPlayerId && p.match_num===mn)
        : null;
      const commAt = pickMeta?.commissioner_at;
      const commBadge = commAt
        ? `<span class="bkt-comm-badge">⚙️ Commissioner override · ${new Date(commAt).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',timeZoneName:'short'})}</span>`
        : "";

      html += `<div class="bkt-match${matchExtraClass}">
        ${label}${earlyNoteHtml}
        <div class="bkt-teams">
          <button class="bkt-team-btn${teamA==="TBD"?" tbd":""}${stateA?" "+stateA:""}"
            ${canPick?`onclick="bktPick(${mn},'${teamA.replace(/'/g,"\\'")}')"`:"disabled"}
          >${esc(teamA)}${checkA?`<span class="bkt-check">${checkA}</span>`:""}</button>
          <button class="bkt-team-btn${teamB==="TBD"?" tbd":""}${stateB?" "+stateB:""}"
            ${canPick?`onclick="bktPick(${mn},'${teamB.replace(/'/g,"\\'")}')"`:"disabled"}
          >${esc(teamB)}${checkB?`<span class="bkt-check">${checkB}</span>`:""}</button>
        </div>${commBadge}
      </div>`;
    });
  });
  return html;
}

function allValidTeamsForMatch(matchNum){
  if(matchNum <= 88){
    const teams = R32_REAL_TEAMS[matchNum];
    return teams ? [...teams] : [];
  }
  const feeds = BRACKET_FEEDS[matchNum];
  if(!feeds) return [];
  return [...allValidTeamsForMatch(feeds[0]), ...allValidTeamsForMatch(feeds[1])];
}

function bktPick(matchNum, team){
  bktPicks[matchNum] = team;
  // Clear all downstream picks that depended on a different winner from this match
  clearDownstreamPicks(matchNum);
  renderBracket();
}

function clearDownstreamPicks(changedMatch){
  // Find all matches that depend on changedMatch (directly or indirectly)
  function dependsOn(mn, target){
    const feeds = BRACKET_FEEDS[mn];
    if(!feeds) return false;
    return feeds.some(f=>Math.abs(f)===target || dependsOn(Math.abs(f), target));
  }
  const allMatches = BRACKET_ROUNDS.flatMap(r=>r.matches);
  allMatches.forEach(mn=>{
    if(mn > 88 && dependsOn(mn, changedMatch)){
      const [a,b] = bktGetTeams(mn, bktPicks, "real");
      // If current pick is no longer a valid team, clear it
      if(bktPicks[mn] && bktPicks[mn] !== a && bktPicks[mn] !== b){
        delete bktPicks[mn];
      }
    }
  });
}

async function submitRealBracket(){
  if(!bktPlayerId){ toast("Select your name first"); return; }

  const pin = $("#bkt-pin")?.value?.trim();
  if(!pin){ toast((bktSubmitted && !bktNeedsPin) ? "Enter your PIN to save" : "Create a PIN first"); return; }
  if(!bktSubmitted || bktNeedsPin){
    const pinConfirm = $("#bkt-pin-confirm")?.value?.trim();
    if(pin !== pinConfirm){ toast("PINs don't match — try again"); return; }
    if(pin.length < 4){ toast("PIN must be at least 4 characters"); return; }
  }

  const allMatches = BRACKET_ROUNDS.flatMap(r=>r.matches);
  const picksArray = allMatches.filter(mn=>bktPicks[mn]).map(mn=>({match_num:mn, picked_team:bktPicks[mn]}));
  if(picksArray.length === 0){ toast("Make at least one pick before saving"); return; }
  const goals = (bktTbGoals !== null && !isNaN(bktTbGoals)) ? bktTbGoals : null;

  const {data, error} = await sb.rpc("save_bracket",{
    p_player_id: bktPlayerId,
    p_pw: pin,
    p_picks: picksArray,
    p_goals: goals,
  });
  if(error || data === false){ console.error(error); toast("Wrong PIN — try again"); return; }

  try{ localStorage.setItem("wc_bkt_pin_"+bktPlayerId, pin); }catch(e){}
  bktPin = pin;
  bktPinVerified = true;
  bktNeedsPin = false;
  toast(`${picksArray.length} of ${allMatches.length} picks saved! 🎉`);
  bktSubmitted = true;
  await loadAll();
  renderBracket();
}

/* ---- Matches / Scores ---- */
function renderMatches(){
  const groups=[...new Set(state.teams.map(t=>t.grp))];
  const ownerName = name=>{ const t=state.teams.find(x=>x.name===name); if(!t||!t.owner_id) return null; const p=playerById(t.owner_id); return p?p.name:null; };
  const lastSync = state.settings["last_sync"];
  const syncNote = lastSync ? ` · Auto-synced ${formatLastSync()}` : '';

  let html=`<div class="card"><h2>Match Scores</h2>
    <p class="hint">${isAdmin ? 'Enter final scores (pre-shootout). Standings update instantly for everyone.' : `Live results — only the commissioner can enter scores.${syncNote}`}</p>
    <div class="filters">
      <select id="grpFilter"><option value="all">All groups</option>${groups.map(g=>`<option value="${g}" ${matchFilterGroup===g?'selected':''}>Group ${g}</option>`).join("")}</select>
    </div></div>`;

  const rounds=[1,2,3];
  rounds.forEach(rd=>{
    let ms=state.matches.filter(m=>m.round===rd);
    if(matchFilterGroup!=="all") ms=ms.filter(m=>m.grp===matchFilterGroup);
    if(!ms.length) return;
    ms.sort((a,b)=>(a.match_date||'').localeCompare(b.match_date||'')||a.id-b.id);
    html+=`<div class="card"><div class="section-title">Matchday ${rd}</div>`;
    ms.forEach(m=>{
      const ho=ownerName(m.home_team), ao=ownerName(m.away_team);
      const hs=m.home_score, as_=m.away_score; const done=hs!==null&&as_!==null;
      const hWin=done&&hs>as_, aWin=done&&as_>hs;
      html+=`<div class="match">
        <div class="mlabel">Group ${m.grp} · Match ${m.id}</div>
        <div class="side home">
          <span class="tm ${hWin?'winner':''}">${esc(m.home_team)}</span>
          <span class="own ${ho?'':'none'}">${ho?esc(ho):'unassigned'}</span>
        </div>
        <div class="scorebox">${ isAdmin
          ? `<input type="number" min="0" inputmode="numeric" data-mid="${m.id}" data-side="home" value="${hs===null?'':hs}"><span>–</span><input type="number" min="0" inputmode="numeric" data-mid="${m.id}" data-side="away" value="${as_===null?'':as_}">`
          : `<span class="sc">${hs===null?'·':hs}</span><span>–</span><span class="sc">${as_===null?'·':as_}</span>` }
        </div>
        <div class="side away">
          <span class="tm ${aWin?'winner':''}">${esc(m.away_team)}</span>
          <span class="own ${ao?'':'none'}">${ao?esc(ao):'unassigned'}</span>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  const dotsHtmlM = POOL_TIPS.map((_,i)=>`<span class="tip-dot${i===tipIndex?' active':''}" data-i="${i}"></span>`).join('');
  const tipsHtml = `<div class="tips-card">
    <div class="section-title">💡 Pool Tips</div>
    <div class="tip-text" id="tip-text">${POOL_TIPS[tipIndex]}</div>
    <div class="tip-dots" id="tip-dots">${dotsHtmlM}</div>
  </div>`;
  $("#tab-matches").innerHTML=tipsHtml+html;
  $$("#tip-dots .tip-dot").forEach(dot=>dot.addEventListener("click",()=>{
    tipIndex=parseInt(dot.dataset.i)-1; advanceTip(1); startTipRotation();
  }));
  startTipRotation();
  $("#grpFilter").addEventListener("change",e=>{ matchFilterGroup=e.target.value; renderMatches(); });
  $$('#tab-matches input[data-mid]').forEach(inp=>{
    inp.addEventListener("change", onScoreChange);
    inp.addEventListener("keydown", e=>{
      if(e.key==="Enter"){ e.preventDefault(); inp.blur(); }
    });
  });
}

async function onScoreChange(e){
  const id=parseInt(e.target.dataset.mid,10);
  const box=e.target.closest(".match");
  const h=box.querySelector('input[data-side="home"]').value;
  const a=box.querySelector('input[data-side="away"]').value;
  const home=num(h), away=num(a);
  // If only one score is entered, wait — don't save or clear yet
  if((home!==null)!==(away!==null)) return;
  const clear=(home===null&&away===null);
  const {error}=await rpc("admin_set_match",{p_id:id,p_home:clear?null:home,p_away:clear?null:away});
  if(error) return;
  await loadAll(); renderMatches(); toast(clear?"Score cleared":"Score saved");
}

/* ---- Updates / Recaps ---- */
function renderRecaps(){
  let html=`<div class="card">
    <h2>Updates &amp; Recaps</h2>
    <p class="hint">Match recaps and pool news from Commissioner Michelle.</p>
    ${isAdmin ? `<div class="recap-form">
      <input id="rcTitle" class="field" type="text" placeholder="Title — e.g. Matchday 1 Recap" />
      <textarea id="rcBody" class="field" placeholder="Write your recap here…"></textarea>
      <button class="btn-gold" id="rcPost" style="width:auto;max-width:160px">Post Update</button>
    </div>` : ''}
  </div>`;

  if(!state.recaps.length){
    html+=`<div class="card" style="text-align:center"><p class="hint" style="margin:0">No updates yet — check back after the first matches play!</p></div>`;
  } else {
    state.recaps.forEach(r=>{
      html+=`<div class="card">
        <div class="recap-head">
          <span class="recap-title">${esc(r.title)}</span>
          <span class="recap-date">${formatDate(r.created_at)}</span>
          ${isAdmin?`<button class="recap-del" data-rid="${r.id}" title="Delete">✕</button>`:''}
        </div>
        <div class="recap-body">${esc(r.body)}</div>
      </div>`;
    });
  }

  $("#tab-recaps").innerHTML=html;

  if(isAdmin){
    $("#rcPost")?.addEventListener("click", postRecap);
    $$(".recap-del").forEach(btn=>btn.addEventListener("click",async()=>{
      if(!confirm("Delete this update?")) return;
      const {error}=await rpc("admin_delete_recap",{p_id:parseInt(btn.dataset.rid,10)});
      if(error) return;
      await loadAll(); renderRecaps(); toast("Update deleted");
    }));
  }
}

async function postRecap(){
  const title = ($("#rcTitle")?.value||"").trim();
  const body  = ($("#rcBody")?.value||"").trim();
  if(!title||!body){ toast("Title and text are both required"); return; }
  const btn = $("#rcPost");
  if(btn){ btn.disabled=true; btn.textContent="Posting…"; }
  const {error}=await rpc("admin_post_recap",{p_title:title,p_body:body});
  if(btn){ btn.disabled=false; btn.textContent="Post Update"; }
  if(error) return;
  await loadAll(); renderRecaps(); toast("Update posted!");
}

function flash(id){ const e=$("#"+id); if(!e)return; e.classList.add("show"); setTimeout(()=>e.classList.remove("show"),1400); }

/* ====================== Tabs ====================== */
function switchTab(tab){
  currentTab=tab;
  $$("nav.tabs button").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  ["leaderboard","matches","bracket","recaps","settings"].forEach(t=>{ const el=$("#tab-"+t); if(el) el.classList.toggle("hidden",t!==tab); });
  renderCurrent();
  window.scrollTo({top:0,behavior:"smooth"});
}

/* ====================== Smack Talk ====================== */
const SMACK_EMOJIS = ['🔥','⚽','🤯','😂','👍','💀','➕'];

function stOwnerName(teamName){
  const t = state.teams.find(t=>t.name===teamName);
  if(!t||!t.owner_id) return null;
  return state.players.find(p=>p.id===t.owner_id)?.name||null;
}

function getAllSmackOpeners(upcomingMatches){
  const {rows} = computeLeaderboard();
  const rank1Name = rows[0]?.player?.name;
  const openers = [];

  upcomingMatches.forEach(m=>{
    const hOwner=stOwnerName(m.home_team), aOwner=stOwnerName(m.away_team);
    const hRank=TEAM_DATA[m.home_team]?.rank||50;
    const aRank=TEAM_DATA[m.away_team]?.rank||50;
    const gap=Math.abs(hRank-aRank);
    const fav=hRank<aRank?m.home_team:m.away_team;
    const dog=hRank>aRank?m.home_team:m.away_team;
    const dogOwner=hRank>aRank?hOwner:aOwner;
    const isRivalry=RIVALRIES.has(`${m.home_team}|${m.away_team}`)||RIVALRIES.has(`${m.away_team}|${m.home_team}`);
    const isCouple=COUPLES.some(([a,b])=>(hOwner===a&&aOwner===b)||(hOwner===b&&aOwner===a));
    const isSibling=SIBLINGS.some(([a,b])=>(hOwner===a&&aOwner===b)||(hOwner===b&&aOwner===a));
    const isHost=HOST_NATIONS.has(m.home_team)||HOST_NATIONS.has(m.away_team);

    if(isCouple&&hOwner&&aOwner)
      openers.push({score:10,text:`${hOwner} vs ${aOwner} — bragging rights on the line when ${m.home_team} plays ${m.away_team} 🏠 who's nervous?`});
    if(isSibling&&hOwner&&aOwner)
      openers.push({score:10,text:`Sibling rivalry! ${hOwner} vs ${aOwner} when ${m.home_team} takes on ${m.away_team} — family dinner is about to get awkward 😂`});
    if(isRivalry)
      openers.push({score:8,text:`${m.home_team} vs ${m.away_team} — one of the great rivalries in world football ⚔️ always delivers drama`});
    if(hOwner&&aOwner&&hOwner!==aOwner){
      if(gap>=20)
        openers.push({score:7,text:`Pool battle: ${hOwner}'s ${m.home_team} vs ${aOwner}'s ${m.away_team} — and the FIFA gap is ${gap} ranks. Someone is in trouble 😬`});
      else
        openers.push({score:5,text:`${hOwner} vs ${aOwner} — one of you is not going to enjoy the next 90 minutes 😏`});
    }
    if(gap>=30&&dogOwner)
      openers.push({score:6,text:`${dog} (FIFA #${Math.max(hRank,aRank)}) vs ${fav} — ${dogOwner}, say something brave 💀`});
    else if(gap>=15&&!hOwner&&!aOwner)
      openers.push({score:4,text:`${fav} is heavily favored over ${dog} — but nobody picks upsets until they happen 👀`});
    if(isHost){
      const host=HOST_NATIONS.has(m.home_team)?m.home_team:m.away_team;
      openers.push({score:5,text:`${host} plays on home soil today — home crowd energy at the World Cup is something else 🏟️`});
    }
    if(m.home_team==="Argentina"||m.away_team==="Argentina")
      openers.push({score:5,text:`Argentina on the pitch — defending champs going back-to-back? 🏆 calling it here`});
    if(rank1Name&&(hOwner===rank1Name||aOwner===rank1Name)){
      const leadTeam=hOwner===rank1Name?m.home_team:m.away_team;
      openers.push({score:5,text:`Pool leader ${rank1Name} has ${leadTeam} in this one — extend the lead or give the rest of us hope? 📊`});
    }
    openers.push({score:1,text:`${m.home_team} vs ${m.away_team} — calling your shot right now: final score? ⚽`});
  });

  // Universal fillers for variety
  openers.push({score:0,text:`Hot take: which team in today's slate is the biggest fraud? 🌶️`});
  openers.push({score:0,text:`If there's a scoreline that completely flips the pool standings today, what is it? 📊`});
  openers.push({score:0,text:`Be honest — which of your teams have you mentally written off already? 😭`});
  openers.push({score:0,text:`Group stage crunch — every point matters. Who's sweating the most right now? 💀`});
  openers.push({score:0,text:`Someone in this pool is about to have a very bad time. Predictions? 😈`});
  openers.push({score:0,text:`Which upset would hurt you the most out of today's matches? 🎯`});

  // Sort by score, dedupe by prefix, return top 4
  openers.sort((a,b)=>b.score-a.score);
  const seen=new Set();
  return openers.filter(o=>{
    const k=o.text.slice(0,40);
    if(seen.has(k)) return false;
    seen.add(k); return true;
  }).slice(0,4).map(o=>o.text);
}

function renderSmackTalk(){
  // 4 upcoming matches for the game cards
  const upcoming = state.matches
    .filter(m=>m.home_score===null&&m.away_score===null&&m.kickoff_utc)
    .sort((a,b)=>new Date(a.kickoff_utc)-new Date(b.kickoff_utc))
    .slice(0,4);

  // Upcoming games cards (n4m styling, no reactions)
  let upcomingHtml='';
  if(upcoming.length){
    const cards=upcoming.map(m=>{
      const hOwner=stOwnerName(m.home_team), aOwner=stOwnerName(m.away_team);
      const ownerLine=hOwner&&aOwner?`${esc(hOwner)} vs ${esc(aOwner)}`:hOwner?esc(hOwner):aOwner?esc(aOwner):'—';
      const hRank=TEAM_DATA[m.home_team]?.rank||50;
      const aRank=TEAM_DATA[m.away_team]?.rank||50;
      const tags=[];
      if(Math.abs(hRank-aRank)>=30) tags.push('🎯 upset watch');
      if(RIVALRIES.has(`${m.home_team}|${m.away_team}`)||RIVALRIES.has(`${m.away_team}|${m.home_team}`)) tags.push('⚔️ rivalry');
      const tagStr=tags.length?`<span style="font-size:11px;color:var(--muted)">${tags.join(' · ')}</span>`:'';
      return `<div class="n4m-match" style="padding:8px 12px">
        <div style="display:flex;align-items:baseline;flex-wrap:wrap;gap:4px 10px">
          <span class="n4m-teams" style="margin:0">${esc(m.home_team)} vs ${esc(m.away_team)}</span>
          <span class="n4m-owners" style="margin:0">${ownerLine}</span>
          <span class="n4m-kickoff" style="margin:0">${esc(fmtKickoffPT(m.kickoff_utc))}</span>
          ${tagStr}
        </div>
      </div>`;
    }).join('');
    upcomingHtml=`<div class="section-title" style="margin-top:4px">📅 Upcoming Games</div>
      <div class="n4m-list" style="gap:6px;margin-bottom:18px">${cards}</div>`;
  }

  // Post form
  const playerOpts=state.players.map(p=>`<option value="${p.id}"${p.id===smackPlayerId?' selected':''}>${esc(p.name)}</option>`).join('');
  const postForm=`<div class="st-post-form">
    <div class="st-form-row">
      <select id="st-player" class="st-player-sel">
        <option value="">— Who are you? —</option>${playerOpts}
      </select>
      <button class="btn-gold" id="st-post-btn" style="white-space:nowrap;min-height:44px">Post 🔥</button>
    </div>
    <textarea id="st-textarea" class="st-textarea" maxlength="150" placeholder="Say your piece…"></textarea>
    <div class="st-char-row">
      <span id="st-char-count" class="st-char-count">0 / 150</span>
    </div>
  </div>`;

  // Paginated feed — all posts, 10 per page, most recent first
  const allPosts=state.smacktalk;
  const totalPosts=allPosts.length;
  const pageSize=10;
  const totalPages=Math.max(1,Math.ceil(totalPosts/pageSize));
  const page=Math.min(smackOffset, totalPages-1);
  const pagePosts=allPosts.slice(page*pageSize,(page+1)*pageSize);

  let feedHtml='';
  if(!totalPosts){
    feedHtml=`<div class="st-empty">No smack yet — be the first 👀</div>`;
  } else {
    feedHtml=pagePosts.map(post=>{
      const author=state.players.find(p=>p.id===post.player_id)?.name||'Unknown';
      const d=new Date(post.created_at);
      const time=d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
      const rxBtns=SMACK_EMOJIS.map(e=>{
        const rxrs=state.smacktalk_reactions.filter(r=>r.post_id===post.id&&r.emoji===e);
        const cnt=rxrs.length;
        const mine=smackPlayerId&&rxrs.find(r=>r.player_id===smackPlayerId);
        return `<button class="st-react-btn${mine?' mine':''}" data-pid="${post.id}" data-emoji="${e}">${e}${cnt>0?`<span class="st-react-cnt">${cnt}</span>`:''}</button>`;
      }).join('');
      const delBtn=isAdmin?`<button class="st-del-btn" data-id="${post.id}" title="Delete">✕</button>`:'';
      const matchRef=post.match_id?(()=>{
        const mx=state.matches.find(x=>x.id===post.match_id);
        return mx?`<div style="font-size:11px;color:var(--muted);margin-bottom:4px">re: ${esc(mx.home_team)} vs ${esc(mx.away_team)}</div>`:'';
      })():'';
      return `<div class="st-post">
        <div class="st-post-header">
          <span class="st-author">${esc(author)}</span>
          <span style="display:flex;align-items:center;gap:2px"><span class="st-time">${time}</span>${delBtn}</span>
        </div>
        ${matchRef}
        <div class="st-msg">${esc(post.message)}</div>
        <div class="st-reactions">${rxBtns}</div>
      </div>`;
    }).join('');
  }

  // Pagination controls
  const hasOlder=(page+1)*pageSize<totalPosts;
  const hasNewer=page>0;
  const paginationHtml=(hasOlder||hasNewer)?`<div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:8px">
    ${hasNewer?`<button class="st-page-btn" data-stdir="newer">← Newer</button>`:'<span></span>'}
    <span class="st-page-info">${page+1} / ${totalPages}</span>
    ${hasOlder?`<button class="st-page-btn" data-stdir="older">Older →</button>`:'<span></span>'}
  </div>`:'';

  const html=`<div class="card">
    ${upcomingHtml}
    <div class="section-title">💬 Smack Talk</div>
    ${postForm}
    <div class="st-divider">The Board</div>
    <div class="st-feed">${feedHtml}</div>
    ${paginationHtml}
  </div>`;

  $("#tab-smacktalk").innerHTML=html;

  // Wire textarea
  const ta=$("#st-textarea");
  if(ta) ta.addEventListener("input",updateStCharCount);

  // Wire player select
  const ps=$("#st-player");
  if(ps) ps.addEventListener("change",()=>{ smackPlayerId=parseInt(ps.value)||null; });

  // Wire post button
  const pb=$("#st-post-btn");
  if(pb) pb.addEventListener("click",submitSmackTalk);

  // Wire reactions
  $$("#tab-smacktalk .st-react-btn").forEach(btn=>btn.addEventListener("click",()=>
    stToggleReaction(btn.dataset.pid, btn.dataset.emoji)
  ));

  // Wire delete
  if(isAdmin) $$("#tab-smacktalk .st-del-btn").forEach(btn=>btn.addEventListener("click",()=>
    stDeletePost(btn.dataset.id)
  ));

  // Wire pagination
  $$("#tab-smacktalk [data-stdir]").forEach(btn=>btn.addEventListener("click",()=>{
    smackOffset=btn.dataset.stdir==="older"?page+1:Math.max(0,page-1);
    renderSmackTalk();
  }));
}

function updateStCharCount(){
  const ta=$("#st-textarea"), cnt=$("#st-char-count");
  if(!ta||!cnt) return;
  const n=ta.value.length;
  cnt.textContent=`${n} / 150`;
  cnt.classList.toggle("warn",n>130);
}

async function submitSmackTalk(){
  const ps=$("#st-player"), ta=$("#st-textarea"), btn=$("#st-post-btn");
  if(!ps||!ta) return;
  const pid=parseInt(ps.value);
  const msg=ta.value.trim();
  if(!pid){ toast("Select your name first"); return; }
  if(!msg){ toast("Write something first 😅"); return; }
  smackPlayerId=pid;
  btn.disabled=true; btn.textContent="Posting…";
  const {error}=await sb.rpc("post_smacktalk",{p_player_id:pid,p_message:msg});
  btn.disabled=false; btn.textContent="Post 🔥";
  if(error){ toast("Post failed — "+error.message.slice(0,50)); return; }
  ta.value=''; updateStCharCount();
  smackOffset=0; // jump back to newest after posting
  await loadAll(); renderSmackTalk();
}

async function stToggleReaction(postId, emoji){
  if(!smackPlayerId){
    const sel=$("#st-player");
    if(sel&&sel.value){ smackPlayerId=parseInt(sel.value); }
    else{ toast("Select your name first to react"); return; }
  }
  await sb.rpc("toggle_smacktalk_reaction",{p_player_id:smackPlayerId,p_post_id:postId,p_emoji:emoji});
  await loadAll(); renderSmackTalk();
}

async function stDeletePost(postId){
  if(!isAdmin) return;
  const {error}=await sb.rpc("delete_smacktalk",{p_pw:adminPw,p_id:postId});
  if(error){ toast("Delete failed"); return; }
  await loadAll(); renderSmackTalk();
}

/* ====================== Auth gate ====================== */
async function tryUnlock(pw){
  const want = setVal("password","");
  if(pw===want){ unlock(); localStorage.setItem("wc_pw",pw); return true; }
  return false;
}
function unlock(){ $("#gate").classList.add("hidden"); $("#app").classList.remove("hidden"); renderCurrent(); }

async function init(){
  await loadAll();
  let savedAdmin=null; try{ savedAdmin=sessionStorage.getItem("wc_admin"); }catch(e){}
  if(savedAdmin){
    const {data}=await sb.rpc("verify_admin",{p_pw:savedAdmin});
    if(data){ isAdmin=true; adminPw=savedAdmin; }
  }
  unlock(); // No site password — open to anyone with the link
  subscribeRealtime();
  // Auto-refresh: poll every 30s + re-fetch when tab becomes visible
  setInterval(()=>{ loadAll().then(renderCurrent); }, 30000);
  document.addEventListener("visibilitychange", ()=>{
    if(document.visibilityState==="visible") loadAll().then(renderCurrent);
  });

  $$("nav.tabs button").forEach(b=>b.addEventListener("click",()=>switchTab(b.dataset.tab)));
  $("#commishBtn").addEventListener("click",()=> isAdmin ? commishLogout() : commishLogin());
  applyMode();
}
init();
</script>
